services:
  - type: web
    name: syndex
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
      - key: INITIAL_CAPITAL
        value: "1000"
      - key: LOG_LEVEL
        value: info
      - key: ANTHROPIC_API_KEY
        sync: false
